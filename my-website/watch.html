<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch</title>

<link rel="stylesheet" href="css/home.css">



<style>

/* BACKGROUND BLUR */

.watch-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(20px) brightness(0.3);
z-index:-1;
}

/* NAVBAR */

.navbar{
position:relative;
z-index:2;
padding:10px 20px;
}

/* WATCH CONTAINER */

.watch-container{
display:grid;
grid-template-columns:3fr 1fr;
gap:25px;
padding:25px;
position:relative;
z-index:2;
max-width:1400px;
margin:auto;
}

/* PLAYER */

.player{
position:relative;
width:100%;
aspect-ratio:16/9;
background:black;
border-radius:12px;
overflow:hidden;
box-shadow:
0 0 40px rgba(0,0,0,0.8),
0 0 80px rgba(0,0,0,0.6);
}
  
.player iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

/* MOVIE INFO */

.movie-info{
background:#1a1a1a;
padding:20px;
border-radius:12px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.movie-info img{
width:140px;
border-radius:10px;
margin-bottom:15px;
}

.movie-info h2{
margin-bottom:10px;
font-size:22px;
}

.movie-info p{
color:#ccc;
font-size:14px;
line-height:1.6;
}

/* SERVER BUTTONS */

.server-buttons{
margin-top:15px;
}

.server-buttons button{
margin:5px;
padding:10px 16px;
border:none;
background:#222;
color:white;
cursor:pointer;
border-radius:8px;
font-weight:bold;
transition:0.2s;
}

.server-buttons button:hover{
background:#00ffff;
color:black;
transform:scale(1.05);
}

/* RECOMMENDATIONS */

.recommendations{
grid-column:1 / -1;
padding:20px;
width:100%;
}

.recommend-list{
display:flex;
overflow-x:auto;
gap:12px;
scroll-behavior:smooth;
}

.recommend-card{
width:140px;
cursor:pointer;
}

.recommend-card img{
width:100%;
border-radius:6px;
transition:0.3s;
}

.recommend-card img:hover{
transform:scale(1.1);
}
  
/* MOBILE DESIGN */

/* MOBILE DESIGN */

@media (max-width:900px){

.watch-container{
grid-template-columns:1fr;
padding:0;
}
.player{
width:100%;
aspect-ratio:16/9;
border-radius:0;
box-shadow:none;
margin:0;
}
}

.movie-info{
text-align:center;
padding:10px;
}

.movie-info img{
width:120px;
margin:auto;
display:block;
}

.server-buttons{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:8px;
}

.server-buttons button{
padding:10px 14px;
font-size:14px;
}

.recommendations{
padding:10px;
}

.recommend-card{
width:110px;
flex-shrink:0;
}

.recommend-list{
gap:10px;
}

}

</style>
  

  
</head>

<body>
  
<div class="watch-bg" id="watch-bg"></div>
  
<div class="navbar">
<a href="index.html">⬅ Back</a>
</div>


<div class="watch-container">

<div class="player">
<iframe
id="video-player"
allowfullscreen
allow="autoplay; encrypted-media"
loading="lazy">
</iframe>
</div>


<div class="movie-info">

<img id="movie-poster">

<h2 id="movie-title"></h2>

<p id="movie-description"></p>

<div class="server-buttons">

<button onclick="changeServer('vidsrc.me')">Vidsrc</button>
  
<button onclick="changeServer('2embed.cc')">2Embed</button>

<button onclick="changeServer('multiembed.mov')">MultiEmbed</button>

</div>
</div>



<div class="recommendations">

<h2>Recommended</h2>

<div class="recommend-list" id="recommend-list"></div>

</div>


<script>

const API_KEY = "bb6302aa8a6d38895b024e4649cc2c07";
const IMG_URL = "https://image.tmdb.org/t/p/w500";

const params = new URLSearchParams(window.location.search);

const id = params.get("id");
const type = params.get("type");

let currentServer = "vidsrc.me";


function loadPlayer(){

let url="";

if(currentServer === "vidsrc.me"){
url = `https://vidsrc.me/embed/${type}/${id}`;
}

else if(currentServer === "2embed.cc"){
url = `https://www.2embed.cc/embed/${id}`;
}

else if(currentServer === "multiembed.mov"){
url = `https://multiembed.mov/?video_id=${id}&tmdb=1`;
}

document.getElementById("video-player").src = url;

}

function changeServer(server){

currentServer = server;
loadPlayer();

}


async function loadMovieInfo(){

const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}`);

const data = await res.json();

document.getElementById("movie-title").textContent = data.title || data.name;

document.getElementById("movie-description").textContent = data.overview;

document.getElementById("movie-poster").src =
`${IMG_URL}${data.poster_path}`;

  document.getElementById("watch-bg").style.backgroundImage =
`url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;

}


async function loadRecommendations(){

const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}/recommendations?api_key=${API_KEY}`);

const data = await res.json();

const container = document.getElementById("recommend-list");

container.innerHTML="";

data.results.slice(0,12).forEach(movie=>{

if(!movie.poster_path) return;

const card=document.createElement("div");
card.className="recommend-card";

const img=document.createElement("img");

img.src=`${IMG_URL}${movie.poster_path}`;

card.appendChild(img);

card.onclick=()=>{
window.location.href=`watch.html?id=${movie.id}&type=${type}`;
};

container.appendChild(card);

});

}


loadPlayer();
loadMovieInfo();
loadRecommendations();

</script>

</body>
</html>
