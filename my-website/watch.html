<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch</title>

<link rel="stylesheet" href="css/home.css">

<style>
.player{
width:100%;
height:80vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
}

.player iframe{
width:100%;
height:100%;
border:none;
}
</style>

</head>

<body>

<div class="navbar">
<a href="index.html">⬅ Back</a>
</div>

<div class="player">

<iframe
id="video-player"
allowfullscreen
allow="autoplay; encrypted-media"
loading="lazy">
</iframe>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const type = params.get("type");

const server = "vidsrc.to"; // cleaner server

document.getElementById("video-player").src =
`https://${server}/embed/${type}/${id}`;

</script>

</body>

</html>
