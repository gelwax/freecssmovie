<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch Movies & TV Shows Online Free</title>
  <link rel="stylesheet" href="css/home.css">
  <link rel="preload" href="css/home.css" as="style">
  <link rel="preload" href="js/home.js" as="script">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script defer src="js/home.js"></script>
</head>

<body>
  <div class="navbar">

  <div class="logo-area">
    <a href="index.html">
      <img src="logo.jpg" class="logo">
    </a>
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <input type="text" class="search-bar" placeholder="Search..." onfocus="openSearchModal()" />
  </div>

</div>

<div class="banner" id="banner">


  <div class="banner-content">
    <h1 id="banner-title"></h1>
    <p id="banner-description"></p>

    <button class="play-btn" onclick="watchNow()">▶ Watch Now</button>

  </div>

</div>



  <div class="row">
    <h2>Trending Movies</h2>
  <div class="scroll-wrapper">

    <button class="scroll-btn left" onclick="scrollRow('movies-list', -1)">❮</button>

    <div class="list" id="movies-list"></div>

    <button class="scroll-btn right" onclick="scrollRow('movies-list', 1)">❯</button>

  </div>

</div>
  
  <div class="row">
    <h2>Trending TV Shows</h2>
  <div class="scroll-wrapper">

    <button class="scroll-btn left" onclick="scrollRow('tvshows-list', -1)">❮</button>

    <div class="list" id="tvshows-list"></div>

    <button class="scroll-btn right" onclick="scrollRow('tvshows-list', 1)">❯</button>

  </div>

</div>
  
  <div class="row">
  <h2>Trending Anime</h2>
  <div class="scroll-wrapper">

    <button class="scroll-btn left" onclick="scrollRow('anime-list', -1)">❮</button>

    <div class="list" id="anime-list"></div>

    <button class="scroll-btn right" onclick="scrollRow('anime-list', 1)">❯</button>

  </div>

</div>
  
<div class="row">
  <h2>Popular Movies</h2>
  <div class="scroll-wrapper">

    <button class="scroll-btn left" onclick="scrollRow('popular-list', -1)">❮</button>

    <div class="list" id="popular-list"></div>

    <button class="scroll-btn right" onclick="scrollRow('popular-list', 1)">❯</button>

  </div>

</div>
  
  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()" style="color: red;">&times;</span>
      <div class="modal-body">
  <img id="modal-image" src="" alt="" />
  <div class="modal-text">
    <h2 id="modal-title"></h2>
    <div class="stars" id="modal-rating"></div>
    <p id="modal-description"></p>
  </div>
</div>
      
<div class="server-selector">
<label for="server">Change Server:</label>

<select id="server" onchange="changeServer()">

<option value="vidsrc.to">Vidsrc</option>

<option value="2embed.cc">2Embed</option>

<option value="multiembed.mov">MultiEmbed</option>

</select>

</div>
      <iframe id="modal-video" width="100%" height="315" frameborder="0" allowfullscreen></iframe>
    </div>
  </div>

  <div class="search-modal" id="search-modal">
    <span class="close" onclick="closeSearchModal()" style="color: red;">&times;</span>
    <input type="text" id="search-input" placeholder="Search for a movie or show..." oninput="searchTMDB()" />
    <div class="results" id="search-results"></div>
  </div>

<footer class="footer">
  <div class="footer-content">
    <p>&copy; 2026 Frecssmovie. All rights reserved.</p>
    <div class="footer-links">
      <a href="#">Disclaimer</a>
      <a href="#">About Us</a>
      <a href="#">Contact Us</a>
    </div>
  </div>
</footer>

  

</body>
