<html>

<head>
<link rel="stylesheet" href="css/home.css">
</head>

<body>

<div class="navbar">
  ...
</div>

<div class="row">
  <h2 id="genre-title"></h2>

  <div class="scroll-wrapper">
    <div class="list" id="genre-list"></div>
  </div>
</div>


<!-- PUT SCRIPT HERE -->

<script>

const API_KEY = "bb6302aa8a6d38895b024e4649cc2c07";
const BASE_URL = "https://api.themoviedb.org/3";
const IMG_URL = "https://image.tmdb.org/t/p/original";

let page = 1;
let loading = false;

const params = new URLSearchParams(window.location.search);
const genre = params.get("genre");

const genreNames = {
28:"Action Movies",
35:"Comedy Movies",
27:"Horror Movies",
878:"Sci-Fi Movies",
10749:"Romance Movies",
16:"Anime"
};

document.getElementById("genre-title").textContent =
genreNames[genre] || "Movies";

async function loadMovies(){

if(loading) return;

loading = true;

let url;

if(genre == 16){
url = `${BASE_URL}/discover/tv?api_key=${API_KEY}&with_genres=16&with_original_language=ja&page=${page}`;
}else{
url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=${genre}&page=${page}`;
}

const res = await fetch(url);
const data = await res.json();

const container = document.getElementById("genre-list");

data.results.forEach(item=>{

if(!item.poster_path) return;

const card = document.createElement("div");
card.className = "movie-card";

card.innerHTML = `
<img src="${IMG_URL}${item.poster_path}">
<div class="movie-info">
<h4>${item.title || item.name}</h4>
<span>⭐ ${item.vote_average.toFixed(1)}</span>
</div>
`;

card.onclick = ()=>{
const type = item.title ? "movie" : "tv";
window.location.href = `watch.html?id=${item.id}&type=${type}`;
};

container.appendChild(card);

});

page++;
loading = false;

}

window.addEventListener("scroll",()=>{

if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 500){
loadMovies();
}

});

loadMovies();

</script>

</body>
</html>
